version: 2

project_name: thicket

before:
  hooks:
    - go mod tidy

builds:
  - id: thicket
    main: ./cmd/thicket
    binary: thicket
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: thicket
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"
      - Merge pull request
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Others
      order: 999

release:
  draft: false
  prerelease: auto
  # Ship install.sh as a top-level release asset so users can do:
  #   curl -fsSL https://github.com/uribrecher/thicket/releases/latest/download/install.sh | sh
  extra_files:
    - glob: ./install.sh
  footer: |
    ---
    ## Install

    Quick install (auto-detects OS + arch, verifies checksum):
    ```
    curl -fsSL https://github.com/uribrecher/thicket/releases/latest/download/install.sh | sh
    ```

    Or, with Go:
    ```
    go install github.com/uribrecher/thicket/cmd/thicket@latest
    ```

    Or grab a tarball above and drop the `thicket` binary on your `$PATH`.
